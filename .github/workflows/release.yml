name: Release

on:
  push:
    branches:
      - main
      - dev

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          target-branch: ${{ github.ref_name }}
          config-file: ${{ github.ref_name == 'dev' && '.release-please-config-dev.json' || '.release-please-config.json' }}
          manifest-file: ${{ github.ref_name == 'dev' && '.release-please-manifest-dev.json' || '.release-please-manifest.json' }}

      # The following steps only run if a new release was actually published
      - name: Checkout Repository
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@v4

      - name: Zip Component
        if: ${{ steps.release.outputs.release_created }}
        run: |
          cd custom_components/grub_os_selector
          zip -r ../../grub_os_selector.zip .

      - name: Upload Release Asset
        if: ${{ steps.release.outputs.release_created }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ steps.release.outputs.tag_name }} grub_os_selector.zip
